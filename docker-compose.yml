services:
  familiar:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://familiar:${POSTGRES_PASSWORD}@postgres:5432/familiar
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./frontend/dist:/app/frontend/dist:ro
      - artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: familiar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: familiar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familiar"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox-builder:
    build:
      context: docker/sandbox
      dockerfile: Dockerfile
    image: familiar-sandbox:latest
    profiles: ["build-sandbox"]
    command: echo "familiar-sandbox image built"

volumes:
  pgdata:
  artifacts:

services:
  familiar:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://familiar:familiar@postgres:5432/familiar
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-}
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - HOST_ARTIFACTS_PATH=${HOST_ARTIFACTS_PATH:-${PWD}/artifacts}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_ARTIFACTS_PATH:-./artifacts}:/app/artifacts
      - ${HOST_CLAUDE_DIR:-${HOME}/.claude}:/root/.claude
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-builder:
        condition: service_completed_successfully

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: familiar
      POSTGRES_PASSWORD: familiar
      POSTGRES_DB: familiar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familiar"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox-builder:
    build:
      context: docker/sandbox
      dockerfile: Dockerfile
    image: familiar-sandbox:latest
    command: echo "familiar-sandbox image built"

volumes:
  pgdata:

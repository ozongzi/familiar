name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize releases so two main pushes can't race on deleting/recreating
# the same draft release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─── Create/refresh the draft release for this version ──────────────────
  # The release tag is derived from the Cargo.toml version instead of a pushed
  # git tag. Bump that version before pushing to main to actually ship an
  # update to clients (the updater compares versions — same version = no-op).
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.rel.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute version and (re)create draft release
        id: rel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          VER=$(grep -m1 '^version = ' frontend/src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="v$VER"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"
          # If this version was already released, delete it (and its tag) so we
          # rebuild cleanly and move the tag onto the current commit. Bumping to
          # a new version leaves older releases untouched.
          gh release delete "$TAG" --repo "$REPO" --cleanup-tag --yes || true
          gh release create "$TAG" --repo "$REPO" --target "$GITHUB_SHA" \
            --draft --title "$TAG" --notes "Automated build from ${GITHUB_SHA::7}"

  # ─── Desktop bundles ────────────────────────────────────────────────────
  desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar: darwin-arm64
            sidecar_suffix: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar: linux-x64
            sidecar_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar: win-x64
            sidecar_suffix: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: tauri-${{ matrix.target }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: tauri-${{ matrix.target }}-

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install frontend deps
        run: bun install
        working-directory: frontend

      # node sidecar (tunnel-bridge) — the binaries/ dir is gitignored, so
      # always fetch the right arch and stash with the target-triple suffix
      # Tauri expects.
      - name: Prepare node sidecar
        shell: bash
        env:
          NODE_VER: v20.18.0
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.sidecar }}
          EXT: ${{ matrix.sidecar_suffix }}
        run: |
          set -e
          BIN_DIR="frontend/src-tauri/binaries"
          mkdir -p "$BIN_DIR"
          DEST="$BIN_DIR/node-${TARGET}${EXT}"
          case "$ARCH" in
            darwin-arm64|darwin-x64)
              curl -fsSL "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-${ARCH}.tar.gz" \
                | tar xz --strip-components=2 -C "$BIN_DIR" "node-${NODE_VER}-${ARCH}/bin/node"
              mv "$BIN_DIR/node" "$DEST"
              ;;
            linux-x64)
              curl -fsSL "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-${ARCH}.tar.xz" \
                | tar xJ --strip-components=2 -C "$BIN_DIR" "node-${NODE_VER}-${ARCH}/bin/node"
              mv "$BIN_DIR/node" "$DEST"
              ;;
            win-x64)
              curl -fsSL -o node.zip "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-${ARCH}.zip"
              unzip -j node.zip "node-${NODE_VER}-${ARCH}/node.exe" -d "$BIN_DIR"
              mv "$BIN_DIR/node.exe" "$DEST"
              rm node.zip
              ;;
          esac
          chmod +x "$DEST" || true
          ls -lah "$DEST"

      - name: Build + bundle + publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ${{ needs.prepare.outputs.tag }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # ─── Android APK ────────────────────────────────────────────────────────
  android:
    needs: [prepare, desktop]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android targets + NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - uses: dtolnay/rust-toolchain@stable

      # Tauri's Android Gradle plugin invokes `cargo tauri ...` from within
      # gradle's exec env, where it can't reach the JS-side `bunx tauri`.
      # Install the Cargo subcommand so `cargo tauri` resolves on the runner.
      - name: Install cargo-tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: tauri-android-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: tauri-android-

      - name: Install frontend deps
        run: bun install
        working-directory: frontend

      # Decode keystore from secret + write keystore.properties expected by
      # the gen/android Gradle build (matches the existing local layout).
      - name: Restore Android signing config
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KS_B64" | base64 -d > frontend/src-tauri/gen/android/upload-keystore.jks
          cat > frontend/src-tauri/gen/android/keystore.properties <<EOF
          password=$KS_PASS
          keyAlias=$KS_ALIAS
          storeFile=$(pwd)/frontend/src-tauri/gen/android/upload-keystore.jks
          EOF

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: frontend
        # --split-per-abi gives one APK per ABI so the updater can target a
        # specific arch (android-aarch64) instead of shipping a fat universal.
        run: bunx tauri android build --apk --split-per-abi

      - name: Collect APKs
        run: |
          mkdir -p android-out
          find frontend/src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec cp {} android-out/ \;
          ls -lah android-out

      - name: Sign APKs + patch latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Download desktop's latest.json from the draft release.
          gh release download "$TAG" --repo "$REPO" -p latest.json -D dl
          cat dl/latest.json

          # Pick the arm64 APK (aarch64 = modern Android default).
          ARM64_APK=$(ls android-out/*arm64*.apk | head -1)
          if [ -z "$ARM64_APK" ]; then
            echo "No arm64-v8a APK produced — check tauri android build output"
            exit 1
          fi

          # Sign with Tauri's ed25519 key (same key as desktop).
          # `tauri signer sign` writes <APK>.sig containing a single line.
          cd frontend
          bunx tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "../$ARM64_APK"
          cd ..
          SIG=$(cat "${ARM64_APK}.sig")
          APK_NAME=$(basename "$ARM64_APK")
          APK_URL="https://github.com/$REPO/releases/download/$TAG/$APK_NAME"

          # jq-patch the platforms map. Android updater plugin checks
          # "android-aarch64" / "android-armv7" / etc.
          jq --arg url "$APK_URL" --arg sig "$SIG" \
            '.platforms["android-aarch64"] = {signature: $sig, url: $url}' \
            dl/latest.json > latest.json
          cat latest.json

          # Upload everything: APKs + .sig + updated latest.json.
          gh release upload "$TAG" android-out/*.apk android-out/*.sig latest.json \
            --repo "$REPO" --clobber

      # Flip the release out of draft only after android-aarch64 has been
      # patched into latest.json — otherwise installed Android clients would
      # see a latest.json without their platform entry and fail to update.
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPO" --draft=false
